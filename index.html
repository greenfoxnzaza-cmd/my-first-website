<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mission</title>
    
    <link rel="stylesheet" type="text/css" href="./style.css">
</head>
<body id="mainBody">

    <div class="app-wrapper">
        
        <div class="container">
            <header>
                <div class="logo-section">
                    <span class="icon">🚀</span>
                    <h2>My Mission</h2>
                </div>
                <button id="modeBtn" class="glass-button" onclick="toggleDarkMode()">
                    ✨ Switch Theme
                </button>
            </header>
            
            <div class="main-content">
                <div class="input-box">
                    <input type="text" id="taskInput" placeholder="เพิ่มภารกิจใหม่ของคุณ...">
                    <button id="add-btn">
                        <span>+</span>
                    </button>
                </div>

                <div class="status-bar">
                    <span>ภารกิจทั้งหมด</span>
                    <span id="taskCount">0</span>
                </div>

                <ul id="taskList">
                    </ul>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
